<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papertek Data Export Viewer</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --surface-color: #18181b;
            --accent-color: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: linear-gradient(to bottom, rgba(24, 24, 27, 0.8), rgba(9, 9, 11, 0));
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .title-group p {
            margin: 0.25rem 0 0;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        #search-input {
            width: 100%;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            outline: none;
        }

        #search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        main {
            flex: 1;
            padding: 0 2rem 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #spreadsheet-container {
            flex: 1;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px -2px rgba(0, 0, 0, 0.5);
        }

        /* Tabulator Customization */
        .tabulator {
            background-color: transparent !important;
            border: none !important;
            font-size: 0.875rem;
        }

        .tabulator-header {
            background-color: rgba(39, 39, 42, 0.5) !important;
            border-bottom: 1px solid var(--border-color) !important;
            color: var(--text-secondary) !important;
            font-weight: 500 !important;
        }

        .tabulator-col {
            background-color: transparent !important;
            border-right: 1px solid var(--border-color) !important;
        }

        .tabulator-row {
            background-color: transparent !important;
            border-bottom: 1px solid var(--border-color) !important;
            transition: background-color 0.1s ease;
        }

        .tabulator-row:hover {
            background-color: rgba(59, 130, 246, 0.05) !important;
        }

        .tabulator-cell {
            border-right: 1px solid var(--border-color) !important;
            padding: 10px !important;
        }

        .tabulator-row.tabulator-selectable:hover {
            background-color: rgba(59, 130, 246, 0.1) !important;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 5px;
            border: 2px solid var(--bg-color);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .status-bar {
            padding: 0.75rem 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-color);
            display: flex;
            gap: 1.5rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-group">
            <h1>Papertek Data Export</h1>
            <p id="file-meta">Viewing Data Export.txt</p>
        </div>
        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" placeholder="Search data...">
        </div>
    </header>

    <main>
        <div id="spreadsheet-container"></div>
    </main>

    <div class="status-bar">
        <div class="status-item">
            <div class="dot"></div>
            <span id="row-count">0 rows loaded</span>
        </div>
        <div class="status-item">
            <span id="col-count">0 columns</span>
        </div>
        <div class="status-item" style="margin-left: auto;">
            Disposable Utility v1.0

    </div>

        function parseTSV(tsv) {
            const lines = tsv.trim().split('\n');
            const headers = lines[0].split('\t');
            
            const data = lines.slice(1).map(line => {
                const values = line.split('\t');
                const row = {};
                headers.forEach((header, i) => {
                    row[header] = values[i] || '';
                });
                return row;
            });
            
            return { headers, data };
        }

        const { headers, data } = parseTSV(rawTsvData);

        // Update UI counters
        document.getElementById('row-count').textContent = `${data.length} rows loaded`;
        document.getElementById('col-count').textContent = `${headers.length} columns`;

        // Initialize Tabulator
        const table = new Tabulator("#spreadsheet-container", {
            data: data,
            layout: "fitDataFill", // Better for horizontal scrolling
            placeholder: "No Data Found",
            resizableColumnFit: true, 
            columnDefaults:{
                resizable:true,
                headerSort:true,
            },
            columns: headers.map(h => ({
                title: h, 
                field: h, 
                sorter: "string",
                headerFilter: false, 
                width: 150, 
            })),
            height: "100%", 
        });

        // Global Search Functionality
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            const value = e.target.value;
            
            if (!value) {
                table.clearFilter();
                return;
            }

            // Simple global filter across all columns
            const filters = headers.map(h => ({
                field: h,
                type: "like",
                value: value,
            }));
            
            // Tabulator OR filter logic
            table.setFilter([filters]); 
        });

        // Adjust table on window resize
        window.addEventListener('resize', () => {
            table.redraw();
        });
