name: papertek
description: "PaperTek — theatrical lighting data manager."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: any

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # UI
  syncfusion_flutter_datagrid: ^31.1.19
  syncfusion_flutter_core: ^31.1.19
  google_fonts: ^6.2.1

  # Desktop window management
  window_manager: ^0.4.3

  # File & path utilities
  path_provider: ^2.1.5
  path: ^1.9.1

  # Printing / reports
  printing: ^5.14.2

  # CSV parsing (import pipeline)
  csv: ^6.0.0

  # File picker dialogs (New Show / Open Show / Import)
  file_picker: ^8.0.0

  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/google_fonts/
