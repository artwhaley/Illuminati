workflows:
  eos-probe-android:
    name: Eos Probe Android Release
    instance_type: linux_x2
    max_build_duration: 60
    working_directory: papertek_eos_probe
    environment:
      flutter: stable
    scripts:
      - name: Verify monorepo application path
        script: |
          test -f pubspec.yaml
          test -d android
          printf 'Building from %s\n' "$PWD"

      - name: Install application dependencies
        script: flutter pub get

      - name: Install protocol package dependencies
        script: |
          cd packages/eos_osc_client
          dart pub get

      - name: Test protocol package
        script: |
          cd packages/eos_osc_client
          dart test

      - name: Test Flutter application
        script: flutter test

      - name: Analyze Flutter application
        script: flutter analyze

      - name: Build Android APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
